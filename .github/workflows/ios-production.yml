name: iOS Production Build + Submit

on:
  workflow_dispatch:

jobs:
  build:
    name: iOS Production Build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      build_id: ${{ steps.build.outputs.build_id }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: mobile/package-lock.json

      - name: Install dependencies
        working-directory: ./mobile
        run: npm ci

      - name: Set up Expo and EAS CLI
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build iOS (production)
        id: build
        working-directory: ./mobile
        run: |
          BUILD_JSON=$(eas build --platform ios --non-interactive --json)
          BUILD_ID=$(echo "$BUILD_JSON" | jq -r '.[0].id')
          if [ -z "$BUILD_ID" ] || [ "$BUILD_ID" = "null" ]; then
            echo "Error: failed to extract build ID from EAS output" >&2
            exit 1
          fi
          echo "build_id=$BUILD_ID" >> $GITHUB_OUTPUT

  submit:
    name: Submit to App Store
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: mobile/package-lock.json

      - name: Install dependencies
        working-directory: ./mobile
        run: npm ci

      - name: Set up Expo and EAS CLI
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Submit iOS to App Store
        working-directory: ./mobile
        run: eas submit --platform ios --id ${{ needs.build.outputs.build_id }} --non-interactive
t
